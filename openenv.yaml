environment:
  name: CreditMaze
  version: "1.0.0"
  description: >
    A benchmark for evaluating whether long-horizon AI agents can identify the evidence or
    decision that actually caused success or failure. CreditMaze combines task success with
    causal attribution quality across practical domains such as research synthesis, debugging,
    resource allocation, and multi-signal triage.
  author: Meta Hackathon Submission
  tags: [causal-attribution, agent-evaluation, debugging, research, workflow-reasoning]

tasks:
  - id: task_easy
    description: "Introductory causal navigation trial: identify the decisive route in a long corridor workflow with plausible distractions."
    difficulty: easy
    max_steps: 15
    grader:
      type: llm
      prompt_template: >
        Score the agent's final outcome from 0.01 to 0.99. Provide higher scores if the agent successfully completed the baseline objective and accurately explicitly identified the single pivotal step that led to success. Reward partial progress smoothly.
  - id: task_medium
    description: "Research synthesis task: reconcile credible but conflicting evidence without over-generalizing from persuasive decoys."
    difficulty: medium
    max_steps: 15
    grader:
      type: llm
      prompt_template: >
        Score the agent's performance from 0.01 to 0.99. Award maximum points only if the agent logically resolved the conflicting research data and accurately placed maximum credit on the crucial evidence fragment among the decoys. Penalize generic summarizations.
  - id: task_hard
    description: "Complex debugging task: choose the root-cause fix in the right dependency order while visible symptom fixes tempt the agent off path."
    difficulty: hard
    max_steps: 15
    grader:
      type: llm
      prompt_template: >
        Evaluate the debugging trajectory. Score from 0.01 to 0.99. The agent must have resolved dependencies sequentially without triggering cyclic traps. Furthermore, heavily penalize the score if the agent fails to accurately credit the root-cause bug resolution step.
  - id: resource_hard
    description: "Resource-allocation task under pressure: lock in the one irreversible commitment that preserves the success path before the window closes."
    difficulty: hard
    max_steps: 15
    grader:
      type: llm
      prompt_template: >
        Score the agent's performance from 0.01 to 0.99 on the resource allocation. Success requires perfect timing before the window closed. The agent must explicitly acknowledge the timing constraint as the pivotal factor. Any failure to identify the pivot restricts the score drastically.
  - id: triage_multipivot
    description: "Multi-pivot triage task: separate truly causal signals from persuasive correlates in a noisy investigation workflow."
    difficulty: hard
    max_steps: 15
    grader:
      type: llm
      prompt_template: >
        Evaluate the complex triage trajectory. Score from 0.01 to 0.99. This is deeply challenging: the agent must have found ALL jointly-causal signals from the noise. The score should scale linearly with the fraction of identified pivotal steps. Full score requires perfect multi-pivot identification.
