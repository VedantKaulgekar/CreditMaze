spec_version: 1
name: CreditMaze
version: "1.0.0"
type: space
runtime: fastapi
app: server.app:app
port: 7860
description: >
  Procedurally generated RL environment for measuring credit assignment quality
  in long-horizon LLM agent tasks. Every episode contains a known pivotal
  decision with ground-truth causal labels verified via counterfactual
  simulation. Introduces PSIA, CCE, and MPCS as novel evaluation metrics.
tags:
  - openenv
  - credit-assignment
  - causal-rl
  - long-horizon
  - grpo
  - process-reward
tasks:
  - id: corridor_easy
    difficulty: easy
    max_steps: 15
    domain: corridor
    tier: easy
    description: "Calibration task: navigate a branching corridor where one junction is causally decisive."
    grader:
      type: programmatic
      endpoint: /grader
      score_range: [0.01, 0.99]
      description: "Returns normalized final score plus PSIA, CCE, TSR, and MPCS from the internal environment grader."
  - id: research_medium
    difficulty: medium
    max_steps: 15
    domain: research
    tier: medium
    description: "Resolve contradicting research sources to produce correct synthesis."
    grader:
      type: programmatic
      endpoint: /grader
      score_range: [0.01, 0.99]
      description: "Returns normalized final score plus PSIA, CCE, TSR, and MPCS from the internal environment grader."
  - id: debugging_hard
    difficulty: hard
    max_steps: 15
    domain: debugging
    tier: hard
    description: "Fix bugs in the correct order - dependency structure is hidden."
    grader:
      type: programmatic
      endpoint: /grader
      score_range: [0.01, 0.99]
      description: "Returns normalized final score plus PSIA, CCE, TSR, and MPCS from the internal environment grader."
  - id: resource_hard
    difficulty: hard
    max_steps: 15
    domain: resource
    tier: hard
    description: "Allocate a time-sensitive resource before an irreversible commitment window closes."
    grader:
      type: programmatic
      endpoint: /grader
      score_range: [0.01, 0.99]
      description: "Returns normalized final score plus PSIA, CCE, TSR, and MPCS from the internal environment grader."
  - id: triage_multipivot
    difficulty: hard
    max_steps: 15
    domain: triage
    tier: multi-pivot
    description: "Identify multiple jointly-causal signals from correlated noise."
    grader:
      type: programmatic
      endpoint: /grader
      score_range: [0.01, 0.99]
      description: "Returns normalized final score plus PSIA, CCE, TSR, and MPCS from the internal environment grader."
action_schema:
  type: object
  properties:
    action_id:
      type: string
      description: "Must be one of observation.available_actions"
    reasoning:
      type: string
      description: "Agent chain-of-thought (optional, stored for PSIA analysis)"
    credit_estimate:
      type: number
      minimum: 0.0
      maximum: 1.0
      description: "Agent self-reported importance of this step (used for CCE)"
  required:
    - action_id
reward_range: [0.0, 1.0]
max_steps: 110
observation_schema: "environment/models.py::Observation"
metrics:
  - name: PSIA
    description: "Pivotal Step Identification Accuracy - did agent assign max credit to true pivot?"
  - name: CCE
    description: "Credit Calibration Error - MSE between agent estimates and ground-truth labels"
  - name: TSR
    description: "Task Success Rate - standard outcome metric"
  - name: MPCS
    description: "Multi-Pivot Coordination Score - fraction of pivots found in Tier 4"
