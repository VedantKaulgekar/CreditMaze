spec_version: 1
env_id: creditmaze
name: CreditMaze
version: "1.0.0"
type: space
runtime: fastapi
app: server.app:app
port: 7860
description: >
  Procedurally generated RL environment for measuring credit assignment quality
  in long-horizon LLM agent tasks. Every episode contains a known pivotal
  decision with ground-truth causal labels verified via counterfactual
  simulation. Introduces PSIA, CCE, and MPCS as novel evaluation metrics.
tags:
  - openenv
  - credit-assignment
  - causal-rl
  - long-horizon
  - grpo
  - process-reward
tasks:
  - id: corridor_easy
    difficulty: easy
    max_steps: 15
    grader:
      type: llm
      prompt_template: "Score the agent's performance on the corridor_easy task from 0.01 to 0.99 based on whether it reached the causally correct path and assigned credit to the pivotal step."
  - id: research_medium
    difficulty: medium
    max_steps: 15
    grader:
      type: llm
      prompt_template: "Score the agent's performance on the research_medium task from 0.01 to 0.99 based on whether it identified the qualified synthesis action and assigned credit to the pivotal step."
  - id: debugging_hard
    difficulty: hard
    max_steps: 15
    grader:
      type: llm
      prompt_template: "Score the agent's performance on the debugging_hard task from 0.01 to 0.99 based on whether it repaired the hidden dependency chain in the correct causal order."
  - id: resource_hard
    difficulty: hard
    max_steps: 15
    grader:
      type: llm
      prompt_template: "Score the agent's performance on the resource_hard task from 0.01 to 0.99 based on whether it committed the resource before the irreversible deadline and credited the pivotal step."
  - id: triage_multipivot
    difficulty: hard
    max_steps: 15
    grader:
      type: llm
      prompt_template: "Score the agent's performance on the triage_multipivot task from 0.01 to 0.99 based on whether it identified the jointly pivotal signals and credited both causally necessary steps."
action_schema:
  type: object
  properties:
    action_id:
      type: string
      description: "Must be one of observation.available_actions"
    reasoning:
      type: string
      description: "Agent chain-of-thought (optional, stored for PSIA analysis)"
    credit_estimate:
      type: number
      minimum: 0.0
      maximum: 1.0
      description: "Agent self-reported importance of this step (used for CCE)"
  required:
    - action_id
reward_range: [0.0, 1.0]
max_steps: 110
observation_schema: "environment/models.py::Observation"
metrics:
  - name: PSIA
    description: "Pivotal Step Identification Accuracy - did agent assign max credit to true pivot?"
  - name: CCE
    description: "Credit Calibration Error - MSE between agent estimates and ground-truth labels"
  - name: TSR
    description: "Task Success Rate - standard outcome metric"
  - name: MPCS
    description: "Multi-Pivot Coordination Score - fraction of pivots found in Tier 4"
